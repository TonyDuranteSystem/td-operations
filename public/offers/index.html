<link rel="icon" type="image/x-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📋</text></svg>">

<style>
:root{--red:#b8292f;--red-dark:#961f24;--blue:#1e3a5f;--blue-light:#e8eff7;--blue-lighter:#f0f5fb;--dark:#1a1a2e;--gray-100:#f7f8fa;--gray-200:#edf0f4;--gray-300:#d1d5db;--gray-500:#6b7280;--gray-700:#374151;--green:#059669;--green-bg:#ecfdf5;--green-border:#a7f3d0;--white:#fff}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Source Sans 3',-apple-system,sans-serif;color:var(--gray-700);background:var(--gray-100);line-height:1.7;-webkit-font-smoothing:antialiased;-webkit-user-select:none;-moz-user-select:none;user-select:none;-webkit-touch-callout:none}
@media print{body{display:none!important}}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;font-size:18px;color:var(--gray-500)}
.loading-spinner{width:40px;height:40px;border:3px solid var(--gray-200);border-top-color:var(--red);border-radius:50%;animation:spin 1s linear infinite;margin-bottom:16px}
@keyframes spin{to{transform:rotate(360deg)}}
.container{max-width:820px;margin:0 auto;background:var(--white);box-shadow:0 1px 3px rgba(0,0,0,.06),0 20px 60px rgba(0,0,0,.06)}
.header-bar{display:flex;justify-content:space-between;align-items:center;padding:24px 48px;border-bottom:1px solid var(--gray-200)}
.logo-img{height:60px}
.hero{background:linear-gradient(135deg,var(--blue) 0%,#162d4a 100%);color:#fff;padding:48px}
.hero-label{font-size:11px;letter-spacing:4px;text-transform:uppercase;opacity:.7;margin-bottom:16px}
.hero h1{font-family:'Playfair Display',serif;font-size:42px;font-weight:800;margin-bottom:32px;line-height:1.15}
.hero-meta{display:flex;gap:48px}
.hero-meta-item{font-size:11px;letter-spacing:2px;text-transform:uppercase;opacity:.6}
.hero-meta-value{font-size:18px;font-weight:600;opacity:1;margin-top:4px}
.hero-line{width:60px;height:3px;background:var(--red);margin-top:32px}
.content{padding:48px}
.intro-block{margin-bottom:40px}
.lang-badge{display:inline-block;padding:2px 10px;border-radius:4px;font-size:11px;font-weight:700;letter-spacing:1px;margin-bottom:8px}
.lang-en{background:var(--blue);color:#fff}
.lang-it{background:var(--green);color:#fff}
.intro-text{font-size:16px;line-height:1.8;color:var(--gray-700);margin-bottom:24px;padding:20px 24px;background:var(--gray-100);border-radius:8px;border-left:3px solid var(--gray-300)}
.section{margin-bottom:48px}
.section-title{font-family:'Playfair Display',serif;font-size:26px;font-weight:700;color:var(--blue);margin-bottom:20px}
.criticita-box{background:#fef2f2;border:1px solid #fecaca;border-radius:12px;padding:32px}
.criticita-box .section-title{color:var(--red)}
.criticita-item{padding:16px 0;border-bottom:1px solid #fecaca;font-size:15px;line-height:1.7}
.criticita-item:last-child{border-bottom:none}
.azioni-box{background:var(--green-bg);border:1px solid var(--green-border);border-radius:12px;padding:32px}
.azioni-box .section-title{color:var(--green)}
.azione-item{padding:12px 0;font-size:15px;line-height:1.7}
.strategia-step{display:flex;gap:20px;margin-bottom:24px;align-items:flex-start}
.step-number{flex-shrink:0;width:44px;height:44px;background:var(--red);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700}
.step-content h3{font-size:18px;font-weight:700;color:var(--blue);margin-bottom:6px}
.step-content p{font-size:15px;line-height:1.7}
.servizi-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
@media(max-width:700px){.servizi-grid{grid-template-columns:1fr}.hero{padding:32px}.content{padding:32px}.hero h1{font-size:32px}.header-bar{padding:16px 24px}.footer{padding:32px 24px}.hero-meta{flex-direction:column;gap:16px}}
.servizio-card{border:1px solid var(--gray-200);border-radius:12px;padding:28px;position:relative;transition:box-shadow .2s}
.servizio-card:hover{box-shadow:0 4px 20px rgba(0,0,0,.08)}
.servizio-card.recommended{border-color:var(--blue);border-width:2px;background:var(--blue-lighter)}
.servizio-card.addon{grid-column:1/-1}
.badge-recommended{position:absolute;top:-12px;right:20px;background:var(--blue);color:#fff;padding:4px 14px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:2px}
.servizio-card h3{font-size:18px;font-weight:700;color:var(--dark);margin-bottom:8px}
.price{font-size:28px;font-weight:700;color:var(--blue)}
.price-label{font-size:13px;color:var(--gray-500);margin-bottom:12px}
.servizio-card p{font-size:14px;color:var(--gray-500);margin-bottom:16px;line-height:1.6}
.includes-label{font-size:11px;letter-spacing:2px;font-weight:700;color:var(--gray-500);margin-bottom:8px}
.includes-list{list-style:none}
.includes-list li{font-size:14px;padding:4px 0;color:var(--gray-700)}
.riepilogo-box{background:var(--blue-light);border-radius:12px;padding:32px;border-left:4px solid var(--blue)}
.riepilogo-section{margin-bottom:24px}
.riepilogo-section:last-child{margin-bottom:0}
.riepilogo-section h4{font-size:16px;font-weight:700;color:var(--blue);margin-bottom:8px}
.riepilogo-line{height:1px;background:rgba(30,58,95,.2);margin-bottom:12px}
.riepilogo-row{display:flex;justify-content:space-between;padding:6px 0;font-size:15px}
.riepilogo-row.annual{color:var(--gray-500);font-size:14px}
.riepilogo-price{font-weight:600}
.riepilogo-total{display:flex;justify-content:space-between;padding:12px 0 0;border-top:2px solid var(--blue);margin-top:8px;font-size:18px;font-weight:700;color:var(--blue)}
.sviluppi-box{background:var(--blue-lighter);border-radius:12px;padding:32px}
.sviluppo-item{padding:8px 0;font-size:15px}
.passo-step{display:flex;gap:20px;margin-bottom:20px;align-items:flex-start}
.passo-number{flex-shrink:0;width:36px;height:36px;background:var(--blue);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700}
.passo-content h4{font-size:16px;font-weight:700;color:var(--dark);margin-bottom:4px}
.passo-content p{font-size:14px;color:var(--gray-500);line-height:1.6}
.cta-box{background:linear-gradient(135deg,var(--red) 0%,var(--red-dark) 100%);color:#fff;text-align:center;padding:48px;border-radius:12px;margin-bottom:48px}
.cta-box h2{font-family:'Playfair Display',serif;font-size:32px;margin-bottom:12px}
.cta-box p{font-size:16px;opacity:.9;margin-bottom:24px}
.cta-button{display:inline-block;background:#fff;color:var(--red);padding:14px 40px;border-radius:8px;font-weight:700;font-size:16px;text-decoration:none;transition:transform .2s,box-shadow .2s}
.cta-button:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.2)}
.payment-section{margin-top:28px;padding-top:24px;border-top:1px solid rgba(255,255,255,.2)}
.payment-label{font-size:12px;letter-spacing:2px;text-transform:uppercase;opacity:.7;margin-bottom:16px}
.payment-buttons{display:flex;flex-direction:column;gap:12px;align-items:center}
.payment-btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;background:linear-gradient(135deg,#22c55e 0%,#16a34a 100%);color:#fff;padding:16px 48px;border-radius:10px;font-weight:700;font-size:17px;text-decoration:none;transition:transform .2s,box-shadow .2s;min-width:320px;box-shadow:0 4px 14px rgba(34,197,94,.3)}
.payment-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(34,197,94,.4)}
.payment-note{font-size:13px;opacity:.7;margin-top:12px}
.payment-secure{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:8px;font-size:12px;opacity:.5}
.bank-box{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);border-radius:12px;padding:24px 32px;text-align:left;margin:20px auto 0;max-width:440px}
.bank-box .bank-title{font-size:13px;letter-spacing:2px;text-transform:uppercase;opacity:.6;margin-bottom:12px;text-align:center}
.bank-row{display:flex;justify-content:space-between;padding:6px 0;font-size:14px;border-bottom:1px solid rgba(255,255,255,.1)}
.bank-row:last-child{border-bottom:none}
.bank-label{opacity:.7}
.bank-value{font-weight:600;font-family:'Source Code Pro',monospace;letter-spacing:.5px}
.bank-amount{margin-top:16px;text-align:center;font-size:22px;font-weight:700}
.bank-ref{margin-top:8px;text-align:center;font-size:13px;opacity:.6}
@media(max-width:700px){.payment-btn{min-width:auto;width:100%;padding:14px 24px}.bank-box{padding:20px 16px}}
.accept-btn{display:inline-flex;align-items:center;justify-content:center;gap:10px;background:linear-gradient(135deg,#1e3a5f 0%,#162d4a 100%);color:#fff;padding:18px 56px;border-radius:10px;font-weight:700;font-size:18px;text-decoration:none;transition:transform .2s,box-shadow .2s;box-shadow:0 4px 20px rgba(30,58,95,.35);letter-spacing:.5px}
.accept-btn:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(30,58,95,.45)}
.footer{background:var(--dark);color:#fff;text-align:center;padding:40px 48px}
.footer-name{font-size:20px;font-weight:700;margin-bottom:4px}
.footer-tagline{font-style:italic;opacity:.6;margin-bottom:16px}
.footer-address{font-size:14px;opacity:.5;line-height:1.6;margin-bottom:20px}
.footer-line{width:60px;height:2px;background:var(--red);margin:0 auto 16px}
.footer-certs{display:flex;justify-content:center;gap:12px;flex-wrap:wrap}
.cert-badge{padding:4px 14px;border:1px solid rgba(255,255,255,.2);border-radius:20px;font-size:12px;opacity:.7}
.error-page{display:flex;align-items:center;justify-content:center;height:100vh;text-align:center;font-family:'Source Sans 3',sans-serif}
.error-page h1{color:var(--red);font-family:'Playfair Display',serif;margin-bottom:12px}
.error-page p{color:var(--gray-500)}
</style>
</head>
<body oncontextmenu="return false">
<div id="app"><div class="loading"><div class="loading-spinner"></div>Caricamento offerta...</div></div>
<script>
var API_URL='https://ydzipybqeebtpcvsbtvs.supabase.co/rest/v1/offers';
var API_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlkemlweWJxZWVidHBjdnNidHZzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3NzQ1OTEsImV4cCI6MjA4NzM1MDU5MX0.Kxq5JQnRupJ-kE6PTz99wwLFKEHJK3sRCPzSyZLjLos';
var LOGO_URL='https://ydzipybqeebtpcvsbtvs.supabase.co/storage/v1/object/public/assets/tony-logos.jpg';

var params=new URLSearchParams(window.location.search);
var token=params.get('t');

function fmt(d){
  var date=new Date(d);
  var m=['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
  return date.getUTCDate()+' '+m[date.getUTCMonth()]+' '+date.getUTCFullYear();
}
function s(v){return v||'';}

async function load(){
  if(!token){document.getElementById('app').innerHTML='<div class="error-page"><div><h1>Link non valido</h1><p>Questo link non contiene un riferimento valido.</p></div></div>';return;}
  try{
    var r=await fetch(API_URL+'?token=eq.'+encodeURIComponent(token)+'&select=*',{headers:{'apikey':API_KEY,'Authorization':'Bearer '+API_KEY}});
    var data=await r.json();
    if(!data||data.length===0){document.getElementById('app').innerHTML='<div class="error-page"><div><h1>Offerta non trovata</h1><p>Questa offerta non esiste o è stata rimossa.</p></div></div>';return;}
    var o=data[0];
    if(o.expires_at&&new Date(o.expires_at)<new Date()){o.status='expired';}
    render(o);
    // Track view
    fetch(API_URL+'?id=eq.'+o.id,{method:'PATCH',headers:{'apikey':API_KEY,'Authorization':'Bearer '+API_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify({view_count:(o.view_count||0)+1,viewed_at:new Date().toISOString(),status:o.status==='draft'?'viewed':o.status})}).catch(function(){});
  }catch(err){
    document.getElementById('app').innerHTML='<div class="error-page"><div><h1>Errore</h1><p>Impossibile caricare l\'offerta. Riprova più tardi.</p></div></div>';
  }
}

function render(o){
  var h='';
  if(o.status==='expired'){h+='<div style="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:1000"><div style="background:#fff;padding:48px;border-radius:16px;text-align:center;max-width:400px"><h2 style="color:#b8292f;margin-bottom:12px">Offerta Scaduta</h2><p>Questa offerta non è più disponibile. Contatta Tony Durante per una nuova proposta.</p></div></div>';}

  h+='<div class="container">';
  h+='<div class="header-bar"><img src="'+LOGO_URL+'" alt="Tony Durante LLC" class="logo-img"></div>';
  h+='<div class="hero"><div class="hero-label">Business Consulting</div><h1>Offerta Consulenziale</h1>';
  h+='<div class="hero-meta"><div><div class="hero-meta-item">Preparata per</div><div class="hero-meta-value">'+s(o.client_name)+'</div></div>';
  h+='<div><div class="hero-meta-item">Data</div><div class="hero-meta-value">'+fmt(o.offer_date)+'</div></div></div>';
  h+='<div class="hero-line"></div></div>';
  h+='<div class="content">';

  if(o.intro_en||o.intro_it){h+='<div class="intro-block">';if(o.intro_en){h+='<div class="lang-badge lang-en">EN</div><div class="intro-text">'+o.intro_en+'</div>';}if(o.intro_it){h+='<div class="lang-badge lang-it">IT</div><div class="intro-text">'+o.intro_it+'</div>';}h+='</div>';}

  if(o.criticita&&o.criticita.length>0){h+='<div class="section criticita-box"><div class="section-title">Criticità Identificate</div><p style="margin-bottom:16px;font-size:15px">Durante la nostra call sono emerse alcune situazioni da risolvere con priorità:</p>';o.criticita.forEach(function(c){h+='<div class="criticita-item"><strong>'+s(c.title)+':</strong> '+s(c.description)+'</div>';});h+='</div>';}

  if(o.azioni_immediate&&o.azioni_immediate.length>0){h+='<div class="section azioni-box"><div class="section-title">Azioni Immediate Consigliate</div>';o.azioni_immediate.forEach(function(a){h+='<div class="azione-item">→ <strong>'+s(a.title)+'</strong> '+s(a.text||a.description)+'</div>';});h+='</div>';}

  if(o.strategia&&o.strategia.length>0){h+='<div class="section"><div class="section-title">La Strategia</div>';o.strategia.forEach(function(st){h+='<div class="strategia-step"><div class="step-number">'+st.step_number+'</div><div class="step-content"><h3>'+s(st.title)+'</h3><p>'+s(st.description)+'</p></div></div>';});h+='</div>';}

  if((o.servizi&&o.servizi.length>0)||(o.servizi_aggiuntivi&&o.servizi_aggiuntivi.length>0)){h+='<div class="section"><div class="section-title">Servizi Proposti</div>';if(o.servizi&&o.servizi.length>1){h+='<p style="margin-bottom:20px;font-size:15px;color:#6b7280">In base alla vostra situazione, potete scegliere tra le opzioni seguenti.</p>';}h+='<div class="servizi-grid">';if(o.servizi){o.servizi.forEach(function(sv){h+='<div class="servizio-card'+(sv.recommended?' recommended':'')+'">';if(sv.recommended){h+='<div class="badge-recommended">CONSIGLIATO</div>';}h+='<h3>'+s(sv.name)+'</h3><div class="price">'+s(sv.price)+'</div><div class="price-label">'+s(sv.price_label)+'</div><p>'+s(sv.description)+'</p>';if(sv.includes&&sv.includes.length>0){h+='<div class="includes-label">INCLUDE:</div><ul class="includes-list">';sv.includes.forEach(function(i){h+='<li>✓ '+i+'</li>';});h+='</ul>';}h+='</div>';});}if(o.servizi_aggiuntivi){o.servizi_aggiuntivi.forEach(function(sv){h+='<div class="servizio-card addon"><h3>'+s(sv.name)+'</h3><div class="price">'+s(sv.price)+'</div><div class="price-label">'+s(sv.price_label)+'</div><p>'+s(sv.description)+'</p>';if(sv.includes&&sv.includes.length>0){h+='<div class="includes-label">INCLUDE:</div><ul class="includes-list">';sv.includes.forEach(function(i){h+='<li>✓ '+i+'</li>';});h+='</ul>';}h+='</div>';});}h+='</div></div>';}

  if((o.riepilogo_costi&&o.riepilogo_costi.length>0)||(o.costi_annuali&&o.costi_annuali.length>0)){h+='<div class="section"><div class="section-title">Riepilogo Costi</div><div class="riepilogo-box">';if(o.riepilogo_costi){o.riepilogo_costi.forEach(function(r){h+='<div class="riepilogo-section"><h4>'+s(r.label)+'</h4><div class="riepilogo-line"></div>';if(r.items){r.items.forEach(function(i){h+='<div class="riepilogo-row"><span>'+s(i.name)+'</span><span class="riepilogo-price">'+s(i.price)+'</span></div>';});}h+='<div class="riepilogo-total"><span>'+s(r.total_label||'Totale')+'</span><span>'+s(r.total)+'</span></div></div>';});}if(o.costi_annuali&&o.costi_annuali.length>0){h+='<div style="margin-top:16px">';o.costi_annuali.forEach(function(c){h+='<div class="riepilogo-row annual"><span>'+s(c.label)+'</span><span class="riepilogo-price">'+s(c.price)+'</span></div>';});h+='</div>';}h+='</div></div>';}

  if(o.sviluppi_futuri&&o.sviluppi_futuri.length>0){h+='<div class="section"><div class="section-title">Sviluppi Futuri</div><div class="sviluppi-box"><p style="margin-bottom:12px;font-size:15px">Una volta operativi con la nuova struttura, possiamo ragionare su passi successivi:</p>';o.sviluppi_futuri.forEach(function(sv){h+='<div class="sviluppo-item">→ '+s(sv.text)+'</div>';});h+='</div></div>';}

  if(o.prossimi_passi&&o.prossimi_passi.length>0){h+='<div class="section"><div class="section-title">Prossimi Passi</div>';o.prossimi_passi.forEach(function(p){h+='<div class="passo-step"><div class="passo-number">'+p.step_number+'</div><div class="passo-content"><h4>'+s(p.title)+'</h4><p>'+s(p.description)+'</p></div></div>';});h+='</div>';}

  h+='<div class="cta-box"><h2>Pronto a Partire?</h2>';
  if(o.status==='signed'||o.status==='completed'){
    h+='<p style="font-size:18px;margin-bottom:16px">✅ Contratto firmato con successo!</p>';
    var ptype=o.payment_type||'none';
    if(ptype==='checkout'&&o.payment_links&&o.payment_links.length>0){
      h+='<p style="opacity:.9;margin-bottom:20px">Procedi con il pagamento per avviare la collaborazione.</p>';
      h+='<div class="payment-buttons">';
      o.payment_links.forEach(function(pl){
        h+='<a href="'+s(pl.url)+'" target="_blank" class="payment-btn">'+s(pl.label)+' — '+s(pl.amount)+'</a>';
      });
      h+='</div>';
      h+='<div class="payment-note">Pagamento sicuro tramite carta di credito, Apple Pay o Bancontact</div>';
      h+='<div class="payment-secure">&#128274; Transazione protetta e crittografata</div>';
    } else if(ptype==='bank_transfer'&&o.bank_details){
      var b=o.bank_details;
      h+='<p style="opacity:.9;margin-bottom:20px">Procedi con il bonifico bancario per avviare la collaborazione.</p>';
      h+='<div class="bank-box"><div class="bank-title">Coordinate Bancarie</div>';
      if(b.beneficiary){h+='<div class="bank-row"><span class="bank-label">Beneficiario</span><span class="bank-value">'+s(b.beneficiary)+'</span></div>';}
      if(b.iban){h+='<div class="bank-row"><span class="bank-label">IBAN</span><span class="bank-value">'+s(b.iban)+'</span></div>';}
      if(b.bic){h+='<div class="bank-row"><span class="bank-label">BIC/SWIFT</span><span class="bank-value">'+s(b.bic)+'</span></div>';}
      if(b.bank_name){h+='<div class="bank-row"><span class="bank-label">Banca</span><span class="bank-value">'+s(b.bank_name)+'</span></div>';}
      if(b.amount){h+='<div class="bank-amount">'+s(b.amount)+'</div>';}
      if(b.reference){h+='<div class="bank-ref">Causale: '+s(b.reference)+'</div>';}
      h+='</div>';
    } else {
      h+='<p style="opacity:.9">Contattaci su WhatsApp per procedere con il pagamento.</p>';
    }
    h+='<div class="payment-section"><p style="opacity:.8;margin-bottom:12px">Hai domande?</p><a href="https://wa.me/17273187027" class="cta-button">Contattaci su WhatsApp</a></div>';
  } else {
    h+='<p>Rivedi e firma il contratto per confermare la collaborazione.</p>';
