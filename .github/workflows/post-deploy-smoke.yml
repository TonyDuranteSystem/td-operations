# P2.6 — Post-deploy smoke checks (extended P2.7/I2/I3/I4)
#
# Vercel auto-deploys on every push to main. This workflow waits for the
# deploy to be live, then verifies 5 critical surfaces (plan §4 P2.6 line
# 567-572 + P2.7 health endpoint):
#   1. https://app.tonydurante.us/                                  (2xx/3xx)
#   2. https://td-operations.vercel.app/api/cron/audit-health-check (HTTP 200 + JSON findings array)
#   3. https://portal.tonydurante.us/portal/login                   (2xx/3xx)
#   4. https://td-operations.vercel.app/api/health                  (HTTP 200 + .ok=true)  [I2 + P2.7]
#   5. https://td-operations.vercel.app/                            (2xx/3xx)              [I4 CRM root]
#
# After checks run, the workflow ALWAYS POSTs the per-check results to
# /api/webhooks/smoke-result so every deploy has a row in
# deploy_smoke_results (plan §4 line 574, consumed by P2.8 /system-health).
# Failures additionally POST to /api/webhooks/smoke-alert for email.
#
# (/api/webhooks + /api/health are in middleware.ts PUBLIC_PREFIXES;
# Bearer auth happens at the route level for webhooks, /api/health is
# the liveness probe and has no auth by design.)
#
# This workflow does NOT block the deploy — Vercel ships independently.
# A red status here means "deploy is live but something broke", not "deploy
# failed".
#
# Required GitHub repo secret: CRON_SECRET (same value as Vercel env).

name: Post-deploy smoke

on:
  push:
    branches: [main]
  workflow_dispatch:

# Cancel the previous smoke run if a new push lands first.
concurrency:
  group: post-deploy-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Post-deploy smoke checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Wait for Vercel deploy
        # Poll /api/health (public, no auth). When the NEW deploy is live
        # the endpoint returns 200 + {ok:true,commit_sha:<short>,...}; we
        # could additionally match the commit_sha against $GITHUB_SHA but
        # the GitHub runner sees the merged SHA while Vercel builds the
        # pushed SHA, which may differ for merge queues — so we just use
        # HTTP 200 as "new code live" and rely on the smoke checks
        # themselves to catch regressions.
        #
        # Why /api/health rather than the webhook-bearer trick used
        # previously: the wait step needs to poll the newest endpoint
        # added in the current change set. Polling an endpoint that was
        # already present on the previous deploy returns 401/200 from
        # OLD code — see commit 4c4741d where this bug caused the first
        # run to hit old code and return 307 on /api/health.
        run: |
          set +e
          HEALTH_URL="https://td-operations.vercel.app/api/health"
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$HEALTH_URL")
            case "$STATUS" in
              200)
                echo "✅ New deploy live after ~$((i*10))s (/api/health returned 200)"
                exit 0
                ;;
              307|404)
                echo "Attempt ${i}/30: /api/health returned $STATUS — old deploy still serving, sleeping 10s..."
                sleep 10
                ;;
              *)
                echo "Attempt ${i}/30: /api/health returned $STATUS — unexpected but proceeding"
                exit 0
                ;;
            esac
          done
          echo "⚠️ /api/health did not return 200 within 5 minutes — proceeding to checks anyway"

      - name: Smoke check 1 — app root (app.tonydurante.us)
        id: check_app
        # App root is auth-gated (middleware redirects to /login for
        # unauthenticated sessions) so we accept 200 or any 3xx as
        # "server alive". 4xx/5xx is a real failure.
        run: |
          set +e
          STATUS=$(curl -s -o /tmp/app_body -w "%{http_code}" --max-time 15 https://app.tonydurante.us/)
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          case "$STATUS" in
            2*|3*) echo "result=pass" >> "$GITHUB_OUTPUT" ;;
            *)     echo "result=fail" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Smoke check 2 — audit-health-check cron
        id: check_audit
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set +e
          # Cron lives on the internal td-operations.vercel.app domain.
          STATUS=$(curl -s -o /tmp/audit_body -w "%{http_code}" --max-time 60 \
            -H "Authorization: Bearer $CRON_SECRET" \
            https://td-operations.vercel.app/api/cron/audit-health-check)
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          if [ "$STATUS" != "200" ]; then
            echo "result=fail" >> "$GITHUB_OUTPUT"
            echo "reason=http_$STATUS" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if jq -e 'has("findings") and (.findings | type == "array")' /tmp/audit_body >/dev/null 2>&1; then
            echo "result=pass" >> "$GITHUB_OUTPUT"
          else
            echo "result=fail" >> "$GITHUB_OUTPUT"
            echo "reason=missing_findings_array" >> "$GITHUB_OUTPUT"
          fi

      - name: Smoke check 3 — portal login
        id: check_portal
        # Portal login is a public path but can 3xx under various Vercel
        # edge configurations. Accept 200 or 3xx as "server alive".
        run: |
          set +e
          STATUS=$(curl -s -o /tmp/portal_body -w "%{http_code}" --max-time 15 \
            https://portal.tonydurante.us/portal/login)
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          case "$STATUS" in
            2*|3*) echo "result=pass" >> "$GITHUB_OUTPUT" ;;
            *)     echo "result=fail" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Smoke check 4 — /api/health (P2.7)
        id: check_health
        # Liveness probe. /api/health is public (middleware.ts
        # PUBLIC_PREFIXES) and returns 200 + {ok:true,...} when the deploy
        # can reach Supabase and has its required env vars. 503 on
        # failure. Strict 200 required.
        run: |
          set +e
          STATUS=$(curl -s -o /tmp/health_body -w "%{http_code}" --max-time 15 \
            https://td-operations.vercel.app/api/health)
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          if [ "$STATUS" != "200" ]; then
            echo "result=fail" >> "$GITHUB_OUTPUT"
            echo "reason=http_$STATUS" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if jq -e '.ok == true' /tmp/health_body >/dev/null 2>&1; then
            echo "result=pass" >> "$GITHUB_OUTPUT"
          else
            echo "result=fail" >> "$GITHUB_OUTPUT"
            echo "reason=ok_false" >> "$GITHUB_OUTPUT"
          fi

      - name: Smoke check 5 — CRM root (td-operations.vercel.app)
        id: check_crm
        # Plan §4 line 572: "CRM root — unhealthy if 500." The CRM
        # dashboard lives at td-operations.vercel.app (internal domain
        # per CLAUDE.md Architecture). Root path is middleware-gated
        # so we accept 2xx or 3xx.
        run: |
          set +e
          STATUS=$(curl -s -o /tmp/crm_body -w "%{http_code}" --max-time 15 \
            https://td-operations.vercel.app/)
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          case "$STATUS" in
            2*|3*) echo "result=pass" >> "$GITHUB_OUTPUT" ;;
            *)     echo "result=fail" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Compose results payload
        id: results
        if: always()
        # Build BOTH the all-results payload (sent every run) and the
        # failures-only payload (sent only when something failed).
        run: |
          set +e

          # All-checks payload for /api/webhooks/smoke-result
          CHECKS=$(jq -nc \
            --arg c1_check "app_root" --arg c1_url "https://app.tonydurante.us/" \
            --arg c1_status "${{ steps.check_app.outputs.status }}" --arg c1_result "${{ steps.check_app.outputs.result }}" \
            --arg c1_expected "HTTP 2xx/3xx" \
            --arg c2_check "audit_health_check_json" --arg c2_url "https://td-operations.vercel.app/api/cron/audit-health-check" \
            --arg c2_status "${{ steps.check_audit.outputs.status }}" --arg c2_result "${{ steps.check_audit.outputs.result }}" \
            --arg c2_expected "HTTP 200 + JSON.findings array" --arg c2_reason "${{ steps.check_audit.outputs.reason }}" \
            --arg c3_check "portal_login" --arg c3_url "https://portal.tonydurante.us/portal/login" \
            --arg c3_status "${{ steps.check_portal.outputs.status }}" --arg c3_result "${{ steps.check_portal.outputs.result }}" \
            --arg c3_expected "HTTP 2xx/3xx" \
            --arg c4_check "api_health" --arg c4_url "https://td-operations.vercel.app/api/health" \
            --arg c4_status "${{ steps.check_health.outputs.status }}" --arg c4_result "${{ steps.check_health.outputs.result }}" \
            --arg c4_expected "HTTP 200 + .ok=true" --arg c4_reason "${{ steps.check_health.outputs.reason }}" \
            --arg c5_check "crm_root" --arg c5_url "https://td-operations.vercel.app/" \
            --arg c5_status "${{ steps.check_crm.outputs.status }}" --arg c5_result "${{ steps.check_crm.outputs.result }}" \
            --arg c5_expected "HTTP 2xx/3xx" \
            '[
               {check:$c1_check,url:$c1_url,status:$c1_status,result:$c1_result,expected:$c1_expected},
               {check:$c2_check,url:$c2_url,status:$c2_status,result:$c2_result,expected:$c2_expected,reason:$c2_reason},
               {check:$c3_check,url:$c3_url,status:$c3_status,result:$c3_result,expected:$c3_expected},
               {check:$c4_check,url:$c4_url,status:$c4_status,result:$c4_result,expected:$c4_expected,reason:$c4_reason},
               {check:$c5_check,url:$c5_url,status:$c5_status,result:$c5_result,expected:$c5_expected}
             ]')

          RESULT_PAYLOAD=$(jq -nc \
            --argjson checks "$CHECKS" \
            --arg sha "$GITHUB_SHA" \
            --arg run "https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            --arg ts "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '{checks:$checks,commit_sha:$sha,workflow_run_url:$run,checked_at:$ts}')
          echo "$RESULT_PAYLOAD" > /tmp/smoke_result.json

          # Failures-only payload for /api/webhooks/smoke-alert (email on failure)
          FAILED=$(echo "$CHECKS" | jq -c '[.[] | select(.result == "fail") | {check, url, expected, actual: ("HTTP " + (.status // "?") + (if .reason then " (" + .reason + ")" else "" end))}]')
          FAIL_COUNT=$(echo "$FAILED" | jq 'length')
          echo "fail_count=$FAIL_COUNT" >> "$GITHUB_OUTPUT"

          if [ "$FAIL_COUNT" = "0" ]; then
            echo "any_failed=false" >> "$GITHUB_OUTPUT"
            echo "✅ All 5 smoke checks passed"
          else
            echo "any_failed=true" >> "$GITHUB_OUTPUT"
            ALERT_PAYLOAD=$(jq -nc \
              --argjson failures "$FAILED" \
              --arg sha "$GITHUB_SHA" \
              --arg run "https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
              --arg ts "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              '{failures:$failures,commit_sha:$sha,workflow_run_url:$run,checked_at:$ts}')
            echo "$ALERT_PAYLOAD" > /tmp/smoke_payload.json
            echo "❌ $FAIL_COUNT smoke check(s) failed:"
            echo "$ALERT_PAYLOAD" | jq .
          fi

      - name: Persist results to deploy_smoke_results
        if: always()
        # ALWAYS posts — green deploys need rows too so /system-health
        # (P2.8) can show history, not just failures.
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set +e
          STATUS=$(curl -s -o /tmp/result_resp -w "%{http_code}" --max-time 30 \
            -X POST \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json" \
            --data @/tmp/smoke_result.json \
            https://td-operations.vercel.app/api/webhooks/smoke-result)
          echo "smoke-result returned $STATUS"
          cat /tmp/result_resp
          if [ "$STATUS" != "200" ]; then
            echo "::warning::smoke-result endpoint returned $STATUS — deploy row may not have been persisted"
          fi

      - name: Send alert email
        if: steps.results.outputs.any_failed == 'true'
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -e
          STATUS=$(curl -s -o /tmp/alert_resp -w "%{http_code}" --max-time 30 \
            -X POST \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json" \
            --data @/tmp/smoke_payload.json \
            https://td-operations.vercel.app/api/webhooks/smoke-alert)
          echo "smoke-alert returned $STATUS"
          cat /tmp/alert_resp
          if [ "$STATUS" != "200" ]; then
            echo "::warning::smoke-alert endpoint returned $STATUS — email may not have been sent"
          fi

      - name: Fail workflow if any check failed
        if: steps.results.outputs.any_failed == 'true'
        run: |
          echo "::error::One or more post-deploy smoke checks failed. See compose-results step for details."
          exit 1
