# P1.8 — Server-side CI mirroring .husky/pre-push
#
# The pre-push hook runs only on developer machines. Any push that
# bypasses pre-push (git push --no-verify, CI deploy workflows, direct
# web UI edits) can still land a broken main. This workflow runs the
# same ESLint + unit + integration + build checks on every push to
# main and every pull request, giving GitHub's main a server-side
# floor independent of local hook state.
#
# Checks (all must pass):
#   1. Hardcoded client-facing domain check (same grep as pre-push)
#   2. ESLint on the full codebase (stricter than pre-push's
#      changed-files scope — CI catches anything pre-push skipped)
#   3. npm run test:unit
#   4. npm run test:integration (P1.7)
#   5. npm run build
#
# Not mirrored:
#   - Remote-sync check (CI IS the remote, doesn't apply)
#   - Node-version auto-select via nvm (CI uses setup-node instead)

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same ref on new pushes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Lint + tests + build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Block hardcoded client-facing domains
        # Mirrors .husky/pre-push lines 20-39. Only lib/config.ts,
        # lib/oauth.ts, lib/mcp/instructions.ts, .well-known, and the
        # QB OAuth callback paths are allowed to reference the internal
        # vercel domain.
        run: |
          set -e
          HARDCODED=$(grep -rn "td-operations\.vercel\.app\|offerte\.tonydurante\.us" \
            --include="*.ts" --include="*.tsx" lib/ app/ 2>/dev/null \
            | grep -v "node_modules" \
            | grep -v "lib/config.ts" \
            | grep -v "lib/oauth.ts" \
            | grep -v "lib/mcp/instructions.ts" \
            | grep -v ".well-known" \
            | grep -v "qb/authorize" \
            | grep -v "qb/callback" || true)
          if [ -n "$HARDCODED" ]; then
            echo "::error::Hardcoded client-facing domain found. Use APP_BASE_URL from lib/config.ts instead."
            echo "$HARDCODED"
            exit 1
          fi

      - name: ESLint (full codebase — errors fail; legacy warnings allowed)
        # Uses `lint:ci` (no --max-warnings 0) so 141 pre-existing warnings
        # don't fail CI. Pre-push + lint-staged still enforce max-warnings 0
        # on CHANGED files, per R067: warnings get cleaned up incrementally
        # as their files are touched. If you want CI strict-mode again,
        # switch to `npm run lint` — but first run it locally and fix every
        # warning (count today: 141).
        run: npm run lint:ci

      - name: Unit tests
        run: npm run test:unit

      - name: Integration tests (P1.7 characterization)
        run: npm run test:integration

      - name: Build
        # Next.js's static prerender phase eagerly invokes route handlers
        # and page modules. Modules that instantiate Supabase clients at
        # load time (via createBrowserClient / createServerClient) throw
        # "supabaseUrl is required" when NEXT_PUBLIC_SUPABASE_URL is
        # unset — which cascades into downstream false-positive
        # "no response returned from route handler" errors on unrelated
        # routes (e.g. /portal/manifest.webmanifest) and fails the build.
        #
        # Vercel's build environment already has these vars set, which
        # is why prod builds green. We provide dummy placeholder values
        # here so Supabase client init succeeds; no real network calls
        # happen during static prerender, so fake URLs are safe. The
        # EXPECTED_SUPABASE_REF assertion in lib/supabase-admin.ts is
        # intentionally NOT set here (it only fires when present).
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://ci-dummy.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: sb_publishable_ci_dummy_placeholder
          SUPABASE_SERVICE_ROLE_KEY: sb_secret_ci_dummy_placeholder
